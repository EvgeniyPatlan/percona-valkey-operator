name: tests
on:
  pull_request: {}
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: unit + envtest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
          cache: true
      - name: go mod tidy is a no-op (deps are pinned)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "::error::go.mod/go.sum are not tidy — run 'go mod tidy' and commit"; exit 1)
      - name: make test (unit + envtest with coverage)
        run: make test
      - name: coverage gate (>=80% on pkg/...)
        run: |
          # Reuse the coverage profile the `make test` step produced above. That run sets
          # KUBEBUILDER_ASSETS (envtest) and scopes to the test-bearing pkg/... packages
          # (coverage policy, docs/architecture/11-testing-qa.md §1). Re-running
          # `go test ./pkg/...` in this step would start with NO envtest assets, so the
          # controller suites skip and the total is under-reported.
          total=$(go tool cover -func=cover.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "pkg coverage: ${total}%"
          awk -v t="${total}" 'BEGIN { if (t+0 < 80.0) { print "::error::pkg coverage " t "% < 80%"; exit 1 } }'
