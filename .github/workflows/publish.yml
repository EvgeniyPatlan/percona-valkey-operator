# publish.yml — operator IMAGE pipeline for the OPERATOR axis on main.
#
# Scope: builds the multi-arch percona/valkey-operator manager image.
#   - pull_request / push   -> build BOTH arches, NEVER push (proves the
#                              Dockerfile is multi-arch-ready). A push/PR event
#                              can NEVER publish an image.
#   - workflow_dispatch     -> the ONLY way an image is pushed: a human clicks
#                              "Run workflow". Even then it pushes to perconalab/
#                              (dev/main) only, under the `dev-publish` Environment
#                              gate. GA percona/* publishing is release.yml.
#
# Registry push is gated TWICE: it requires (1) a manual workflow_dispatch (no
# push/PR event triggers a push at all), AND (2) the `dev-publish` Environment's
# protection rules. This holds regardless of repo settings — an unconfigured
# environment cannot leak a push because no automatic event reaches the push job.
#
# This workflow NEVER spins up a Valkey cluster (arch 10 §7.1 invariant) and
# NEVER publishes GA percona/* images. GA publishing of all four images +
# chart-releaser is release.yml (manual dispatch / tag, human-approved).
name: publish

on:
  pull_request: {}
  push:
    branches: [main]
    tags: ['v*']
  # The ONLY trigger that can push an image (human-initiated). push/PR are
  # build-only; no automatic event ever reaches the push job.
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ----- PR: build BOTH arches, NEVER push (no environment, no creds) -----
  # A manifest list cannot be --load-ed locally, so this only proves the
  # Dockerfile is multi-arch-ready. No registry interaction whatsoever.
  build-only:
    name: operator image — buildx (push/PR = build-only, no push)
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve build metadata
        id: meta
        run: |
          echo "git_commit=$(git rev-parse --short HEAD)" >>"$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >>"$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: buildx (PR, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          build-args: |
            VERSION=ci-${{ github.sha }}
            GIT_COMMIT=${{ steps.meta.outputs.git_commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}

  # ----- main/tag: PUSH to perconalab/ (dev registry only), HUMAN-GATED -----
  # This is the ONLY push in this workflow. It is wired so publishing is NOT
  # automatic-on-merge: `environment: dev-publish` makes GitHub pause the job
  # for the configured environment's protection rules (set required reviewers
  # there to require an explicit human click before any dev image ships). It
  # targets perconalab/ exclusively — GA percona/* images are NEVER pushed from
  # here (that is release.yml, separately approved). A defensive assertion
  # aborts if the resolved tag is ever a percona/ (GA) reference.
  dev-publish:
    name: operator image — buildx PUSH to perconalab/ (manual dispatch + gated)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Required-approval gate: configure the `dev-publish` Environment in repo
    # settings with reviewers (or branch/tag restrictions) so no dev image is
    # pushed without a human approving the run.
    environment: dev-publish
    steps:
      - uses: actions/checkout@v4
      - name: Resolve build metadata
        id: meta
        run: |
          echo "git_commit=$(git rev-parse --short HEAD)" >>"$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >>"$GITHUB_OUTPUT"
      - name: Assert dev registry owner (never GA percona/*)
        run: |
          set -euo pipefail
          tag="perconalab/valkey-operator:${{ github.ref_name }}"
          case "${tag}" in
            percona/*) echo "::error::refusing to push a GA percona/* image from publish.yml — GA is release.yml only"; exit 1 ;;
            perconalab/*) echo "dev registry owner OK: ${tag}" ;;
            *) echo "::error::unexpected image owner in '${tag}'"; exit 1 ;;
          esac
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: buildx (PUSH to perconalab/ — dev/main only)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: perconalab/valkey-operator:${{ github.ref_name }}
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ steps.meta.outputs.git_commit }}
            BUILD_TIME=${{ steps.meta.outputs.build_time }}
