apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-operator
  labels:
    app.kubernetes.io/name: percona-valkey-operator
    app.kubernetes.io/component: manager
    app.kubernetes.io/managed-by: kustomize
spec:
  # Production posture is replicas: 2+ with leader election (doc 04 §8). The
  # base ships 1 for the namespaced default; overlays / Helm bump it.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: percona-valkey-operator
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: percona-valkey-operator
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: valkey-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 10
      containers:
      - name: manager
        # Replaced by `kustomize edit set image controller=<img>` in `make deploy`.
        image: controller:latest
        args:
        - --leader-elect=true
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8080
        env:
        # POD_NAMESPACE lets controller-runtime resolve the leader-election Lease
        # namespace reliably (downward API), independent of the serviceaccount
        # token mount path.
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # WATCH_NAMESPACE empty => cluster-wide; the namespaced default sets it to
        # the operator's own namespace.
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
