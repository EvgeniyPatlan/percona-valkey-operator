# Namespaced leader-election Role for the cluster-wide install. Even when
# watching all namespaces, the operator's leader-election Lease lives in its own
# namespace, so these verbs stay namespaced (doc 04 §8).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: valkey-operator-leader-election
  labels:
    app.kubernetes.io/name: percona-valkey-operator
    app.kubernetes.io/managed-by: kustomize
rules:
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - get
  - list
  - watch
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - create
  - get
  - list
  - watch
  - update
  - patch
  - delete
