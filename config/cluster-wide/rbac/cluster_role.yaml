# Cluster-wide ClusterRole. Watches all namespaces (cw-bundle, doc 02 §7).
# Hand-maintained mirror of the controller-gen-generated namespaced role
# (config/rbac/role.yaml): kept in lockstep with the exact least-privilege verb
# table in docs/architecture/07-security.md §6.1 (read-only pods, no wildcard, no
# blanket Secret access). When the +kubebuilder:rbac markers change, re-run
# `make manifests` and copy the regenerated rules here (controller-gen writes only
# the namespaced role; kustomize forbids referencing files outside this root, so
# this cluster-scoped copy is updated by hand). 07 §6.3.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: valkey-operator
  labels:
    app.kubernetes.io/name: percona-valkey-operator
    app.kubernetes.io/managed-by: kustomize
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - persistentvolumeclaims/status
  verbs:
  - get
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - watch
- apiGroups:
  - cert-manager.io
  resources:
  - certificates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - valkey.percona.com
  resources:
  - perconavalkeybackups
  - perconavalkeyclusters
  - perconavalkeyrestores
  - valkeynodes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - valkey.percona.com
  resources:
  - perconavalkeybackups/finalizers
  - perconavalkeyclusters/finalizers
  - perconavalkeyrestores/finalizers
  - valkeynodes/finalizers
  verbs:
  - update
- apiGroups:
  - valkey.percona.com
  resources:
  - perconavalkeybackups/status
  - perconavalkeyclusters/status
  - perconavalkeyrestores/status
  - valkeynodes/status
  verbs:
  - get
  - patch
  - update
