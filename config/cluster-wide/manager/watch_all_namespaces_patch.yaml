# Cluster-wide watch: override WATCH_NAMESPACE to empty so the operator watches
# ALL namespaces (doc 02 §7, 04 §8). POD_NAMESPACE is retained for leader
# election. This strategic-merge patch replaces the env list on the manager
# container.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-operator
spec:
  template:
    spec:
      containers:
      - name: manager
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: WATCH_NAMESPACE
          value: ""
