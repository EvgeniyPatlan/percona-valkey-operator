# Full production cluster (03 §11.2): durable storage, TLS, ACL users, scheduled
# backups, smart updates. Dev image tags (perconalab/*:main-*); GA percona/* tags
# are set by `make release` in M7.
apiVersion: valkey.percona.com/v1alpha1
kind: PerconaValkeyCluster
metadata:
  name: prod
  namespace: valkey
spec:
  crVersion: "0.1"
  image: perconalab/percona-valkey:main
  imagePullSecrets:
    - name: percona-registry
  mode: cluster
  shards: 3
  replicas: 2
  workloadType: StatefulSet
  pause: false

  resources:
    requests: { cpu: "1", memory: 4Gi }
    limits:   { cpu: "2", memory: 4Gi }
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels: { app.kubernetes.io/instance: prod }

  persistence:
    size: 50Gi
    storageClassName: fast-ssd     # immutable once set
    reclaimPolicy: Retain

  config:
    maxmemory: "3gb"               # live-settable via CONFIG SET
    maxmemory-policy: "allkeys-lru" # live-settable
    appendonly: "yes"              # requires pod roll (config hash)

  tls:
    secretName: prod-valkey-tls     # secret-ref mode: Secret with ca.crt / tls.crt / tls.key
    # --- cert-manager mode (recommended; mutually exclusive with secretName) ---
    # certManager:
    #   issuerRef:
    #     name: prod-ca-issuer
    #     kind: ClusterIssuer         # Issuer | ClusterIssuer

  users:
    - name: app
      enabled: true
      passwordSecret:
        name: prod-users
        keys: [app-current, app-previous]   # multi-password rotation
      commands:
        allow: ["@read", "@write"]
        deny:  ["@admin", "flushall", "flushdb"]
      keys:
        readWrite: ["app:*"]

  exporter:
    enabled: true

  podDisruptionBudget: Managed

  backup:
    image: perconalab/valkey-backup:main
    storages:
      s3-primary:
        type: s3
        s3:
          bucket: percona-valkey-backups
          prefix: prod
          region: eu-central-1
          credentialsSecret: prod-s3-creds
    schedule:
      - name: nightly-full
        schedule: "0 2 * * *"
        storageName: s3-primary
        keep: 7
        type: full

  upgradeOptions:
    apply: Recommended
    schedule: "0 4 * * *"
    versionServiceEndpoint: https://check.percona.com
