# Per-CRD aggregated viewer/editor/admin ClusterRoles (07 section 6.4).
#
# STATIC, hand-maintained RBAC — NOT the controller-gen-generated operator
# role.yaml (which is regenerated by `make manifests` and must not be hand
# edited). These let platform admins bind END USERS to the CRDs without granting
# operator-level rights. The rbac.authorization.k8s.io/aggregate-to-* labels make
# them compose with the cluster's built-in admin/edit/view ClusterRoles.
#
# ValkeyNode is intentionally NOT given a user-facing editor/admin role — it is
# an internal implementation CR and users must never edit it directly (07 6.4).
# A read-only viewer for ValkeyNode is provided for on-call drill-down only.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: percona-valkey-cluster-viewer
  labels:
    app.kubernetes.io/managed-by: percona-valkey-operator
    rbac.authorization.k8s.io/aggregate-to-view: "true"
rules:
  - apiGroups: ["valkey.percona.com"]
    resources:
      - perconavalkeyclusters
      - perconavalkeybackups
      - perconavalkeyrestores
      - valkeynodes
    verbs: ["get", "list", "watch"]
  - apiGroups: ["valkey.percona.com"]
    resources:
      - perconavalkeyclusters/status
      - perconavalkeybackups/status
      - perconavalkeyrestores/status
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: percona-valkey-cluster-editor
  labels:
    app.kubernetes.io/managed-by: percona-valkey-operator
    rbac.authorization.k8s.io/aggregate-to-edit: "true"
rules:
  # Editor manages the user-facing CRs only (cluster + backup + restore); it does
  # NOT get ValkeyNode write access (internal CR — 07 6.4).
  - apiGroups: ["valkey.percona.com"]
    resources:
      - perconavalkeyclusters
      - perconavalkeybackups
      - perconavalkeyrestores
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["valkey.percona.com"]
    resources:
      - perconavalkeyclusters/status
      - perconavalkeybackups/status
      - perconavalkeyrestores/status
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: percona-valkey-cluster-admin
  labels:
    app.kubernetes.io/managed-by: percona-valkey-operator
    rbac.authorization.k8s.io/aggregate-to-admin: "true"
rules:
  - apiGroups: ["valkey.percona.com"]
    resources:
      - perconavalkeyclusters
      - perconavalkeybackups
      - perconavalkeyrestores
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["valkey.percona.com"]
    resources:
      - perconavalkeyclusters/status
      - perconavalkeybackups/status
      - perconavalkeyrestores/status
    verbs: ["get", "update", "patch"]
  # Admin may read ValkeyNode for deep drill-down but still cannot edit it.
  - apiGroups: ["valkey.percona.com"]
    resources: ["valkeynodes", "valkeynodes/status"]
    verbs: ["get", "list", "watch"]
