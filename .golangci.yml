# golangci-lint v2 configuration for percona-valkey-operator (Go 1.26).
# Run with `make lint`; validate with `make lint-config`.
# The logcheck linter is provided by the custom plugin built from
# .custom-gcl.yml (run the resulting ./bin/custom-gcl binary in CI).
version: "2"

run:
  timeout: 5m
  build-tags: []

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gocyclo
    - dupl
    - goconst
    - ineffassign
    - unused
    - unparam
    - unconvert
    - prealloc
    - nakedret
    - lll
    - misspell
    - copyloopvar
    - depguard
    # - logcheck    # enabled only in the custom-gcl binary (see .custom-gcl.yml)

  settings:
    gocyclo:
      min-complexity: 20
    lll:
      line-length: 140
    dupl:
      threshold: 150
    depguard:
      rules:
        main:
          # Prefer the stdlib `slices` package over `sort` (modernize).
          deny:
            - pkg: sort
              desc: "use the slices package (slices.Sort/SortFunc) instead of sort"

  exclusions:
    generated: strict
    rules:
      # Generated API code (deepcopy) and verbose type files: relax line-length
      # and duplicate-detection noise.
      - path: pkg/apis/.*
        linters:
          - lll
          - dupl
      - path: zz_generated\..*\.go
        linters:
          - lll
          - dupl
          - unparam
      # Test files: allow repeated literals and longer lines.
      - path: _test\.go
        linters:
          - goconst
          - dupl
          - lll

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - valkey.percona.com/percona-valkey-operator
