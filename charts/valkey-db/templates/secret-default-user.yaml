{{- if and .Values.auth.enabled .Values.secrets.defaultUserPassword }}
# Default-user password Secret — created ONLY when a literal password is supplied
# (dev/test convenience). Production should reference a pre-existing, externally
# managed Secret via auth.passwordSecret.name and leave secrets.defaultUserPassword
# empty (never inline real credentials — arch 07-security.md, ADR-008).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "valkey-db.defaultUserSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-db.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.secrets.defaultUserPassword | quote }}
{{- end }}
