suite: valkey-operator templates
templates:
  - deployment.yaml
  - serviceaccount.yaml
  - rbac-operator.yaml
  - rbac-leader-election.yaml
  - rbac-aggregate.yaml
release:
  name: op
  namespace: valkey
tests:
  # ---- Deployment ----
  - it: renders the operator Deployment with the GA image and AppVersion tag
    template: deployment.yaml
    asserts:
      - isKind: { of: Deployment }
      - equal:
          path: spec.template.spec.containers[0].image
          value: percona/valkey-operator:0.1.0
      - equal:
          path: spec.template.spec.containers[0].name
          value: manager
      - equal:
          path: spec.template.spec.serviceAccountName
          value: op-valkey-operator

  - it: honours an explicit image.tag override
    template: deployment.yaml
    set:
      image.tag: "0.2.0-rc1"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: percona/valkey-operator:0.2.0-rc1

  - it: defaults WATCH_NAMESPACE to the release namespace (namespaced scope)
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WATCH_NAMESPACE
            value: "valkey"

  - it: sets WATCH_NAMESPACE empty when watching all namespaces
    template: deployment.yaml
    set:
      watchAllNamespaces: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WATCH_NAMESPACE
            value: ""

  - it: pins WATCH_NAMESPACE to an explicit watchNamespace
    template: deployment.yaml
    set:
      watchNamespace: "ns-a"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WATCH_NAMESPACE
            value: "ns-a"

  - it: enables the webhook flag and port by default
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--enable-webhooks=true"
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook-server
            containerPort: 9443
            protocol: TCP

  - it: disables the webhook when webhook.enable=false
    template: deployment.yaml
    set:
      webhook.enable: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--enable-webhooks=false"
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: webhook-server
            containerPort: 9443
            protocol: TCP

  - it: hardens the container security context
    template: deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true

  - it: honours the replicas override
    template: deployment.yaml
    set:
      replicas: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  # ---- ServiceAccount ----
  - it: creates the ServiceAccount by default
    template: serviceaccount.yaml
    asserts:
      - isKind: { of: ServiceAccount }
      - equal:
          path: metadata.name
          value: op-valkey-operator

  - it: omits the ServiceAccount when serviceAccount.create=false
    template: serviceaccount.yaml
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  # ---- RBAC: namespaced scope (default) ----
  - it: renders a namespaced Role + RoleBinding by default
    template: rbac-operator.yaml
    documentIndex: 0
    asserts:
      - isKind: { of: Role }
      - equal:
          path: metadata.namespace
          value: valkey

  - it: never grants wildcard resource access
    template: rbac-operator.yaml
    documentIndex: 0
    asserts:
      - notContains:
          path: rules[*].resources
          content: "*"

  # ---- RBAC: cluster-wide scope ----
  - it: renders a ClusterRole + ClusterRoleBinding when watchAllNamespaces=true
    template: rbac-operator.yaml
    set:
      watchAllNamespaces: true
    documentIndex: 0
    asserts:
      - isKind: { of: ClusterRole }

  - it: binds the ClusterRole to the operator ServiceAccount
    template: rbac-operator.yaml
    set:
      watchAllNamespaces: true
    documentIndex: 1
    asserts:
      - isKind: { of: ClusterRoleBinding }
      - equal:
          path: subjects[0].name
          value: op-valkey-operator
      - equal:
          path: subjects[0].namespace
          value: valkey

  - it: omits operator RBAC entirely when rbac.create=false
    template: rbac-operator.yaml
    set:
      rbac.create: false
    asserts:
      - hasDocuments:
          count: 0

  # ---- RBAC: leader election (always namespaced) ----
  - it: always renders a namespaced leader-election Role
    template: rbac-leader-election.yaml
    set:
      watchAllNamespaces: true
    documentIndex: 0
    asserts:
      - isKind: { of: Role }
      - equal:
          path: metadata.namespace
          value: valkey

  # ---- RBAC: aggregation ClusterRoles ----
  - it: renders the admin/edit/view aggregation ClusterRoles by default
    template: rbac-aggregate.yaml
    documentIndex: 0
    asserts:
      - isKind: { of: ClusterRole }
      - equal:
          path: metadata.labels["rbac.authorization.k8s.io/aggregate-to-admin"]
          value: "true"

  - it: suppresses aggregation ClusterRoles when disabled
    template: rbac-aggregate.yaml
    set:
      rbac.aggregateClusterRoles: false
    asserts:
      - hasDocuments:
          count: 0
