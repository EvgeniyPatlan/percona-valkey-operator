# e2e-tests/conf/cr-cluster.yaml — cluster-mode CR template for kuttl cases.
#
# Rendered by `apply_cluster` (e2e-tests/functions) with envsubst: ${CLUSTER_NAME} and
# ${VALKEY_VERSION} are substituted from the harness / the run-*.csv row. A 3-shard ×
# 1-replica durable (StatefulSet + persistence) cluster — the canonical init-cluster
# shape (docs/architecture/11-testing-qa.md §3.1). Keep it minimal: cases that need
# TLS/ACL/backup overlay their own fields or use a dedicated template.
apiVersion: valkey.percona.com/v1alpha1
kind: PerconaValkeyCluster
metadata:
  name: ${CLUSTER_NAME}
spec:
  image: perconalab/percona-valkey:${VALKEY_VERSION}
  mode: cluster
  shards: 3
  replicas: 1
  workloadType: StatefulSet
  persistence:
    size: 1Gi
  resources:
    requests: { cpu: "100m", memory: 256Mi }
