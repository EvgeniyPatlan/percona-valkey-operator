# tests/slot-migration-interrupt/04-start-drain.yaml  (TestStep)
# Start scale-in (4 → 3): the operator drains the leaving shard one PlanDrainMove per
# reconcile, each an atomic `CLUSTER MIGRATESLOTS SLOTSRANGE … NODE …` (batch 400)
# until the draining shard owns 0 slots (arch data-plane §212-214). Patching shards
# down here only KICKS OFF the drain; the interruption happens in 05.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 60
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      kube patch pvk cluster1 --type merge -p '{"spec":{"shards":3}}'
