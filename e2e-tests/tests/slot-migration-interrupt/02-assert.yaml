# tests/slot-migration-interrupt/02-assert.yaml  (TestAssert)
# The 4-shard cluster forms fully before we start the drain.
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      exec_valkey cluster1 'CLUSTER INFO' | grep -q 'cluster_state:ok'
      exec_valkey cluster1 'CLUSTER INFO' | grep -q 'cluster_slots_assigned:16384'
---
apiVersion: valkey.percona.com/v1alpha1
kind: PerconaValkeyCluster
metadata:
  name: cluster1
spec:
  shards: 4
status:
  state: Ready
  conditions:
    - type: ClusterFormed
      status: "True"
    - type: SlotsAssigned
      status: "True"
    - type: Ready
      status: "True"
