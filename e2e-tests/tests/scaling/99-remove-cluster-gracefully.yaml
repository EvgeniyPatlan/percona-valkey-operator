# tests/scaling/99-remove-cluster-gracefully.yaml  (TestStep)
# Graceful teardown: delete the CR so the operator's finalizers run the ordered
# cluster teardown → backup-artifact cleanup → PVC reclaim (arch §2.2 item 7)
# before kuttl GCs the namespace.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 180
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      kube delete pvk cluster1 --wait=true --timeout=150s
