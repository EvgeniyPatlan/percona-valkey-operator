# tests/scaling/03-seed-data.yaml  (TestStep)
# Seed a spread of keys BEFORE rebalancing so scale-out / scale-in can prove no
# slot loss and no data loss. The keys hash (CRC16) across all three initial
# shards; after rebalancing they must still read back identically.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 120
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      exec_valkey cluster1 'CLUSTER INFO' | grep -q 'cluster_state:ok'
      exec_valkey cluster1 'CLUSTER INFO' | grep -q 'cluster_slots_assigned:16384'
      # -c follows MOVED/ASK so each write lands on its owning shard.
      for i in $(seq 1 100); do
        exec_valkey cluster1 -c SET "e2e:scale:key:${i}" "val-${i}"
      done
