# tests/quorum-loss/02-assert.yaml  (TestAssert)
# The cluster forms Ready BEFORE we induce the outage — proves the subsequent Degraded
# is caused by the fault, not a failure to bootstrap.
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
---
apiVersion: valkey.percona.com/v1alpha1
kind: PerconaValkeyCluster
metadata:
  name: cluster1
status:
  state: Ready
  conditions:
    - type: ClusterFormed
      status: "True"
    - type: SlotsAssigned
      status: "True"
    - type: Ready
      status: "True"
