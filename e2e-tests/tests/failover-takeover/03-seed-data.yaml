# tests/failover-takeover/03-seed-data.yaml  (TestStep)
# Seed deterministic data before the fault so 04-assert can prove no slot loss after
# the TAKEOVER promotion. Separate step index (03) so it strictly follows the 02
# create+assert pair (kuttl runs index 02 to completion — including its TestAssert —
# before index 03 starts). Re-checks readiness defensively.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 120
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      wait_cluster_ready cluster1 600
      exec_valkey cluster1 'CLUSTER INFO' | grep -q 'cluster_state:ok'
      exec_valkey cluster1 'CLUSTER INFO' | grep -q 'cluster_slots_assigned:16384'
      for i in $(seq 1 30); do
        exec_valkey cluster1 -c SET "e2e:fto:key:${i}" "val-${i}"
      done
