# tests/tls/02-assert.yaml  (TestAssert)
# The TLS cluster forms over TLS: state=Ready, the operator-provisioned TLS Secret
# internal-cluster1-tls carries the three-key kubernetes.io/tls material, and the
# StatefulSet mounts it read-only at /etc/valkey/tls (the FROZEN M5 mount path).
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
commands:
  - script: |-
      source ../../functions
      # The StatefulSet mounts the TLS Secret at the contract path.
      kube get statefulset valkey-cluster1-0-0 -o yaml \
        | grep -q '/etc/valkey/tls' || {
          echo "TLS Secret is not mounted at /etc/valkey/tls" >&2; exit 1; }
---
apiVersion: v1
kind: Secret
metadata:
  name: internal-cluster1-tls
type: kubernetes.io/tls
---
apiVersion: valkey.percona.com/v1alpha1
kind: PerconaValkeyCluster
metadata:
  name: cluster1
status:
  state: Ready
  conditions:
    - type: ClusterFormed
      status: "True"
    - type: SlotsAssigned
      status: "True"
    - type: Ready
      status: "True"
