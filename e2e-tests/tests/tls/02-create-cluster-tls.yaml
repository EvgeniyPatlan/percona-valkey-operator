# tests/tls/02-create-cluster-tls.yaml  (TestStep)
# Create a self-signed cert-manager Issuer and a TLS-enabled cluster that
# references it via spec.tls.certManager.issuerRef. The operator provisions a
# Certificate (cert-manager writes ca.crt/tls.crt/tls.key into the
# internal-cluster1-tls Secret), mounts it at /etc/valkey/tls, and renders
# tls-port=6379 / port=0 / tls-cluster=yes / tls-replication=yes — so the whole
# cluster (client port + bus + replication) forms over TLS (arch §7, shared_types
# TLSConfig). ${VALKEY_VERSION} substituted via envsubst.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 300
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      # Self-signed Issuer (namespaced) — the simplest cert-manager source for CI.
      kube apply -f - <<'EOF'
      apiVersion: cert-manager.io/v1
      kind: Issuer
      metadata:
        name: valkey-selfsigned
      spec:
        selfSigned: {}
      EOF
      # functions sets VALKEY_VERSION/CLUSTER_NAME with := (not exported); export
      # them so envsubst (a child process) sees them for the inline CR below.
      export VALKEY_VERSION CLUSTER_NAME
      envsubst <<'EOF' | kube apply -f -
      apiVersion: valkey.percona.com/v1alpha1
      kind: PerconaValkeyCluster
      metadata:
        name: cluster1
      spec:
        image: percona/valkey:${VALKEY_VERSION}
        mode: cluster
        shards: 3
        replicas: 1
        workloadType: StatefulSet
        persistence:
          size: 1Gi
        resources:
          requests: { cpu: "100m", memory: 256Mi }
        tls:
          certManager:
            issuerRef:
              name: valkey-selfsigned
              kind: Issuer
          authClients: optional
      EOF
