# tests/tls/99-remove-cluster-gracefully.yaml  (TestStep)
# Graceful teardown via the finalizer path (the delete-ssl finalizer cleans the
# operator-provisioned cert material) before namespace GC.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 180
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      kube delete pvk cluster1 --wait=true --timeout=150s
