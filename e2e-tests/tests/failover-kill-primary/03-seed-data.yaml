# tests/failover-kill-primary/03-seed-data.yaml  (TestStep)
# Seed deterministic data BEFORE the fault so we can prove zero slot/data loss after
# recovery. The keys are chosen to spread across slots; -c follows MOVED so each write
# lands on its owning shard. The exact set is re-read verbatim in 04-assert.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 120
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      exec_valkey cluster1 'CLUSTER INFO' | grep -q 'cluster_state:ok'
      exec_valkey cluster1 'CLUSTER INFO' | grep -q 'cluster_slots_assigned:16384'
      # Seed a fixed keyspace spread across shards (different CRC16 keyslots).
      for i in $(seq 1 50); do
        exec_valkey cluster1 -c SET "e2e:fkp:key:${i}" "val-${i}"
      done
      # Sanity: read one back immediately.
      test "$(exec_valkey cluster1 -c GET e2e:fkp:key:1)" = "val-1"
