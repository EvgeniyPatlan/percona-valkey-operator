# tests/init-cluster/02-assert.yaml  (TestAssert)
# The cluster forms: state=Ready with ClusterFormed/SlotsAssigned/Ready conditions
# True. kuttl polls the live object against this PARTIAL spec until it matches or the
# timeout fires (image pull + CLUSTER MEET + ADDSLOTSRANGE + REPLICATE take minutes).
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
---
apiVersion: valkey.percona.com/v1alpha1
kind: PerconaValkeyCluster
metadata:
  name: cluster1
status:
  state: Ready
  conditions:
    - type: ClusterFormed
      status: "True"
    - type: SlotsAssigned
      status: "True"
    - type: Ready
      status: "True"
