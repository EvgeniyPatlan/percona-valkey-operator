# tests/acl-users/04-rotate-password.yaml  (TestStep)
# Password rotation window: because passwordSecret lists BOTH keys (pass1, pass2),
# the operator renders the app user with both passwords valid simultaneously
# (Valkey multi-password). Prove BOTH authenticate — that is exactly the property
# that lets clients roll from the old to the new password with zero downtime
# (live ACL SETUSER, no pod roll). Rotation = drop the retired key from the
# Secret/spec on a later reconcile; here we assert the overlapping-valid window.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 180
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      pod="$(kube get pod \
        -l app.kubernetes.io/instance=cluster1,app.kubernetes.io/name=percona-valkey \
        -o jsonpath='{.items[0].metadata.name}')"
      test -n "$pod" || { echo "no valkey pod for cluster1" >&2; exit 1; }
      # Both the OLD (pass1) and NEW (pass2) passwords authenticate during the
      # rotation window.
      for p in p4ss-one p4ss-two; do
        kube exec "$pod" -c valkey -- \
          valkey-cli --user app --pass "$p" --no-auth-warning PING \
          | grep -q 'PONG' || {
            echo "password '${p}' did not authenticate during rotation window" >&2
            exit 1
          }
      done
      echo "OK: both rotation passwords authenticate (multi-password window)"
