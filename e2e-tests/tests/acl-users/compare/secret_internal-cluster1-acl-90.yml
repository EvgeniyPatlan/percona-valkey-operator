# GOLDEN — tests/acl-users/compare/secret_internal-cluster1-acl-90.yml  (engine 9.0)
#
# Expected shape of the rendered ACL Secret internal-cluster1-acl (type
# valkey.io/acl), holding the users.acl the engine loads. compare_kubectl
# NORMALIZES volatile fields (resourceVersion, uid, creationTimestamp,
# managedFields) AND the password-bearing portions of the rendered ACL lines (the
# >hash / #sha tokens are per-run/random and MUST be normalized out) — only the
# stable rule structure (user names, command +/-@categories, key patterns) is
# compared.
#
# REGENERATE-DON'T-PAPER-OVER (arch §3.3): an intended ACL-rendering change is
# captured with `compare_kubectl secret/internal-cluster1-acl --save`; never
# hand-edit. NOTE: this golden documents the STRUCTURE; the byte-exact users.acl
# (with password hashes normalized) is produced by --save on a live cluster.
apiVersion: v1
kind: Secret
metadata:
  name: internal-cluster1-acl
  labels:
    app.kubernetes.io/name: percona-valkey
    app.kubernetes.io/instance: cluster1
    app.kubernetes.io/managed-by: percona-valkey-operator
    valkey.percona.com/cluster: cluster1
type: valkey.io/acl
stringData:
  # Rendered users.acl — password tokens NORMALIZED. The app user has the
  # allow/deny commands and the app:* key scope from spec.users[]; the reserved
  # system users (_operator/_exporter/_backup) are appended by the operator.
  users.acl: |
    user app on >NORMALIZED >NORMALIZED ~app:* +@read +@write -flushall -flushdb
    user _operator on >NORMALIZED ~* +@all
    user _exporter on >NORMALIZED ~* +info +client|info +ping +latency +slowlog -@all
    user _backup on >NORMALIZED ~* +@read +bgsave +save
