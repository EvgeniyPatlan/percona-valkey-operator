# tests/acl-users/02-assert.yaml  (TestAssert)
# Cluster forms and the rendered ACL Secret exists. The detailed ACL-rule and
# allow/deny behaviour is asserted in 03 against the live engine.
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
---
apiVersion: v1
kind: Secret
metadata:
  name: internal-cluster1-acl
type: valkey.io/acl
---
apiVersion: valkey.percona.com/v1alpha1
kind: PerconaValkeyCluster
metadata:
  name: cluster1
status:
  state: Ready
  conditions:
    - type: ClusterFormed
      status: "True"
    - type: SlotsAssigned
      status: "True"
    - type: Ready
      status: "True"
