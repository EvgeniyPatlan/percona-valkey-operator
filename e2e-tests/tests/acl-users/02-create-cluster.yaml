# tests/acl-users/02-create-cluster.yaml  (TestStep)
# Create the app-user password Secret with TWO keys (pass1/pass2) so password
# rotation can be exercised live (Valkey multi-password: both are valid during the
# rotation window), then a cluster with a named ACL user "app": allow @read/@write,
# explicitly deny flushall/flushdb, key access scoped to app:* . The operator
# renders all users (plus the reserved system users) into the
# internal-cluster1-acl Secret and applies them (arch §7, shared_types UserACLSpec).
# ${VALKEY_VERSION} substituted via envsubst.
apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 300
commands:
  - script: |-
      set -o xtrace
      source ../../functions
      kube create secret generic app-user-pass \
        --from-literal=pass1=p4ss-one \
        --from-literal=pass2=p4ss-two \
        --dry-run=client -o yaml | kube apply -f -
      # functions sets VALKEY_VERSION/CLUSTER_NAME with := (not exported); export
      # them so envsubst (a child process) sees them for the inline CR below.
      export VALKEY_VERSION CLUSTER_NAME
      envsubst <<'EOF' | kube apply -f -
      apiVersion: valkey.percona.com/v1alpha1
      kind: PerconaValkeyCluster
      metadata:
        name: cluster1
      spec:
        image: perconalab/percona-valkey:${VALKEY_VERSION}
        mode: cluster
        shards: 3
        replicas: 1
        workloadType: StatefulSet
        persistence:
          size: 1Gi
        resources:
          requests: { cpu: "100m", memory: 256Mi }
        users:
          - name: app
            enabled: true
            passwordSecret:
              name: app-user-pass
              keys: [pass1, pass2]
            commands:
              allow: ["@read", "@write"]
              deny: ["flushall", "flushdb"]
            keys:
              readWrite: ["app:*"]
      EOF
