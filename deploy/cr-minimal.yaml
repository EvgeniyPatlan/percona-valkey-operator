# Minimal cache cluster (03 §11.1): no persistence, no TLS, no backup.
# Self-contained: creates the `valkey` namespace then a cache cluster in it, so
# `kubectl apply -f cr-minimal.yaml` works against the cluster-wide operator
# (cw-bundle.yaml), which watches all namespaces. For the namespaced operator
# (bundle.yaml, watches only `valkey-operator`), create your cluster in the
# `valkey-operator` namespace instead.
# The has() guards keep this valid; marker defaults fill exporter={enabled:true},
# podDisruptionBudget=Managed, replicas=1; CheckNSetDefaults keeps shards=3, fills
# image and crVersion.
apiVersion: v1
kind: Namespace
metadata:
  name: valkey
---
apiVersion: valkey.percona.com/v1alpha1
kind: PerconaValkeyCluster
metadata:
  name: cache
  namespace: valkey
spec:
  mode: cluster
  shards: 3
  replicas: 1
  workloadType: Deployment        # cache: no PVCs
  # persistence omitted -> has() guards keep this valid
  # exporter defaults to {enabled:true}; pdb defaults to Managed
